# A service will find and connect Pods based on the Selector
apiVersion: v1
kind: Service
metadata:
  name: web-service
  labels:
    app: nginx
spec:
  type: NodePort
  ports:
  - port: 80
    protocol: TCP
  selector:
    app: nginx

# Using the cmd below alone would requires an existing deployment (where webserver is the name of the existing deployment)
# -> kubectl expose deployment webserver --name=web-service --type=NodePort