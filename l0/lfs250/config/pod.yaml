# Using a configMap inside a pod
apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx:1.29
      ports:
        - containerPort: 80
      volumeMounts:
        - mountPath: /etc/nginx
          name: nginx-conf
  volumes:
    - name: nginx-conf
      configMap:
        name: nginx-conf